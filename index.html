<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>3D Portal Viewer – Video Preview</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/"
        }
      }
    </script>

    <style>
      :root {
        color-scheme: dark;
        --panel-bg: rgba(0, 0, 0, 0.7);
        --panel-border: rgba(255, 255, 255, 0.08);
        --accent: #4cc3ff;
        --text: #f3f3f3;
        --muted: #999999;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background:
          radial-gradient(circle at 10% -10%, #b0b0b0 0, transparent 40%),
          radial-gradient(circle at 80% 0%, #9a9a9a 0, transparent 40%),
          radial-gradient(circle at 50% 120%, #05060a 0, #05060a 55%, #010103 100%);
        color: var(--text);
      }

      #app { position: relative; width: 100vw; height: 100vh; }
      #viewerContainer { position: absolute; inset: 0; overflow: hidden; }
      canvas { display: block; }

      #toolbar {
        position: absolute;
        top: 16px;
        left: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 12px;
        background: var(--panel-bg);
        border-radius: 10px;
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(12px);
        z-index: 10;
      }

      #toolbar .group {
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: stretch;
      }

      button.tool-btn {
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.03),
          rgba(0, 0, 0, 0.6)
        );
        color: var(--text);
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 13px;
        line-height: 1.4;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.7),
          0 6px 18px rgba(0, 0, 0, 0.5);
        transition:
          background 0.15s ease,
          transform 0.08s ease,
          box-shadow 0.15s ease,
          border-color 0.15s ease,
          color 0.15s ease;
        white-space: nowrap;
      }

      button.tool-btn span.dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 1px rgba(76, 195, 255, 0.5),
          0 0 10px rgba(76, 195, 255, 0.9);
      }

      button.tool-btn.primary {
        background: radial-gradient(circle at 0 0, #4cc3ff, #2672ff);
        border-color: rgba(255, 255, 255, 0.4);
        color: #050505;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.4),
          0 10px 25px rgba(0, 0, 0, 0.7);
      }

      button.tool-btn:hover:not(:disabled) {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.09),
          rgba(0, 0, 0, 0.45)
        );
        transform: translateY(-1px);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.7),
          0 10px 24px rgba(0, 0, 0, 0.7);
      }

      button.tool-btn.primary:hover:not(:disabled) {
        background: radial-gradient(circle at 0 0, #5fd1ff, #337dff);
      }

      button.tool-btn:active:not(:disabled) {
        transform: translateY(0);
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.7),
          0 4px 10px rgba(0, 0, 0, 0.6);
      }

      button.tool-btn:disabled {
        opacity: 0.45;
        cursor: default;
        box-shadow: none;
      }

      #infoPanel {
        position: absolute;
        left: 16px;
        bottom: 16px;
        max-width: 420px;
        padding: 10px 12px;
        background: var(--panel-bg);
        border-radius: 10px;
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(12px);
        font-size: 12px;
        line-height: 1.4;
        color: var(--muted);
        z-index: 10;
      }

      #infoPanel h2 {
        margin: 0 0 4px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #cccccc;
      }

      #infoPanel ul {
        margin: 4px 0 0;
        padding-left: 16px;
      }

      #infoPanel li { margin-bottom: 2px; }

      #loadingOverlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, rgba(0, 0, 0, 0.85), #000);
        color: var(--text);
        font-size: 14px;
        z-index: 20;
        transition: opacity 0.25s ease;
      }

      #loadingOverlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loadingOverlay .box {
        padding: 16px 18px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.14);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.85);
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 220px;
        text-align: center;
      }

      #loadingOverlay .label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--muted);
      }

      #loadingOverlay .status { font-size: 13px; }

      #loadingOverlay .bar {
        margin-top: 4px;
        height: 3px;
        width: 100%;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
        position: relative;
      }

      #loadingOverlay .bar::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent,
          var(--accent),
          transparent
        );
        animation: loading-bar 1.4s linear infinite;
      }

      @keyframes loading-bar {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div id="viewerContainer"></div>

      <div id="toolbar">
        <div class="group">
          <button
            id="sweetspotFrontBtn"
            class="tool-btn primary"
            type="button"
          >
            <span class="dot"></span>
            Sweetspot Front
          </button>

          <button id="sweetspotBackBtn" class="tool-btn" type="button">
            Sweetspot Back
          </button>
        </div>
      </div>

      <div id="infoPanel">
        <h2>Navigation &amp; Modes</h2>
        <ul>
          <li>Mouse: Left‑drag orbit, right‑drag pan, scroll to zoom.</li>
          <li>Videos are controlled via URL parameters (inner, outer, floor).</li>
        </ul>
      </div>

      <div id="loadingOverlay">
        <div class="box">
          <div class="label">STATUS</div>
          <div id="loadingStatus" class="status">Loading model…</div>
          <div class="bar"></div>
        </div>
      </div>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      const viewerContainer = document.getElementById("viewerContainer");
      const loadingOverlay = document.getElementById("loadingOverlay");
      const loadingStatus = document.getElementById("loadingStatus");
      const sweetspotFrontBtn = document.getElementById("sweetspotFrontBtn");
      const sweetspotBackBtn = document.getElementById("sweetspotBackBtn");

      const scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0xb0b0b0, 2500, 6000);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        powerPreference: "high-performance",
        alpha: true
      });
      renderer.setClearColor(0x000000, 0);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      viewerContainer.appendChild(renderer.domElement);

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        10000
      );
      scene.add(camera);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      function goToSweetspotFront() {
        camera.position.set(596.88, 147.29, -590.89);
        controls.target.set(13.78, 147.94, 13.52);
        controls.update();
      }

      function goToSweetspotBack() {
        camera.position.set(-689.68, 185.28, 671.48);
        controls.target.set(-4.40, 82.51, 1.90);
        controls.update();
      }

      const hemiLight = new THREE.HemisphereLight(0xb0b0b0, 0x4a4a4a, 0.9);
      hemiLight.position.set(0, 1, 0);
      scene.add(hemiLight);

      /*
      const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
      dirLight.position.set(300, 600, 200);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(2048, 2048);
      const d = 1200;
      dirLight.shadow.camera.left = -d;
      dirLight.shadow.camera.right = d;
      dirLight.shadow.camera.top = d;
      dirLight.shadow.camera.bottom = -d;
      scene.add(dirLight);
      */

      const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
      fillLight.position.set(-600, 400, -500);
      scene.add(fillLight);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.25);
      scene.add(ambientLight);

      const shadowPlaneGeo = new THREE.PlaneGeometry(8000, 8000);
      const floorMat = new THREE.MeshStandardMaterial({
        color: 0xb0b0b0,
        roughness: 0.9,
        metalness: 0.0
      });
      const floorMesh = new THREE.Mesh(shadowPlaneGeo, floorMat);
      floorMesh.rotation.x = -Math.PI / 2;
      floorMesh.position.y = -0.01;
      scene.add(floorMesh);

      const shadowMat = new THREE.ShadowMaterial({
        color: 0x000000,
        opacity: 0.3
      });
      const shadowPlane = new THREE.Mesh(shadowPlaneGeo, shadowMat);
      shadowPlane.rotation.x = -Math.PI / 2;
      shadowPlane.position.y = 0;
      shadowPlane.receiveShadow = true;
      scene.add(shadowPlane);

      function onResize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      }
      window.addEventListener("resize", onResize);
      onResize();

      const loadingManager = new THREE.LoadingManager();
      loadingManager.onStart = () => {
        loadingStatus.textContent = "Loading assets…";
        loadingOverlay.classList.remove("hidden");
      };
      loadingManager.onProgress = (url, loaded, total) => {
        loadingStatus.textContent = `Loading ${loaded} / ${total}…`;
      };
      loadingManager.onError = (url) => {
        loadingStatus.textContent = `Error loading: ${url}`;
      };

      loadingManager.setURLModifier((url) => {
        const lower = url.toLowerCase();
        if (
          lower.endsWith(".png") ||
          lower.endsWith(".jpg") ||
          lower.endsWith(".jpeg") ||
          lower.endsWith(".webp")
        ) {
          const filename = url.split("/").pop();
          return "models/" + filename;
        }
        return url;
      });

      const gltfLoader = new GLTFLoader(loadingManager);
      gltfLoader.setPath("models/");

      let model = null;
      const originalMaps = new WeakMap();
      const innerMaterials = [];
      const outerMaterials = [];
      const floorMaterials = [];

      function setupModel(root) {
        root.traverse((child) => {
          if (!child.isMesh) return;

          child.castShadow = true;
          child.receiveShadow = true;
          child.visible = true;

          const materials = Array.isArray(child.material)
            ? child.material
            : [child.material];

          for (const mat of materials) {
            if (!mat) continue;
            mat.side = THREE.DoubleSide;
            if (mat.map) mat.map.colorSpace = THREE.SRGBColorSpace;
            originalMaps.set(mat, mat.map || null);

            const name = (mat.name || "").toLowerCase();
            const meshName = (child.name || "").toLowerCase();

            if (
              name.startsWith("portal_inside_specs") ||
              meshName.includes("portal_inside_specs")
            ) {
              innerMaterials.push(mat);
            } else if (
              name.startsWith("portal_outside_specs") ||
              meshName.includes("portal_outside_specs")
            ) {
              outerMaterials.push(mat);
            } else if (
              name.startsWith("portal_floor_specs") ||
              meshName.includes("portal_floor_specs")
            ) {
              floorMaterials.push(mat);
            }
          }
        });

        const box = new THREE.Box3().setFromObject(root);
        const center = new THREE.Vector3();
        box.getCenter(center);

        root.position.sub(center);
        const minY = box.min.y - center.y;
        root.position.y -= minY;

        shadowPlane.position.y = 0;
        floorMesh.position.y = -0.01;

        scene.add(root);

        root.scale.set(100, 100, 100);
        root.updateMatrixWorld(true);

        goToSweetspotFront();
      }

      sweetspotFrontBtn.addEventListener("click", () => {
        goToSweetspotFront();
      });

      sweetspotBackBtn.addEventListener("click", () => {
        goToSweetspotBack();
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      loadingStatus.textContent = "Loading model…";
      gltfLoader.load(
        "Portal_mapped.glb",
        (gltf) => {
          model = gltf.scene;
          setupModel(model);
          window.model = model;

          loadingOverlay.classList.add("hidden");
        },
        undefined,
        (error) => {
          console.error("GLB load error", error);
          loadingStatus.textContent = "Error loading model.";
        }
      );
    </script>
  </body>
</html>
